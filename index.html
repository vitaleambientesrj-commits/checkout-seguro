<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vitale Ambientes | Pagamento</title>
  <script src="https://js.fastsoftbrasil.com/security.js"></script>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: Arial, sans-serif;
    }

    body {
      background: linear-gradient(135deg, #2b2b2b, #3a3a3a);
      color: #f5f5f5;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .container {
      width: 100%;
      max-width: 520px;
      background: #1f1f1f;
      border: 1px solid #3d3d3d;
      border-radius: 18px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.35);
      overflow: hidden;
    }

    .header {
      padding: 28px 24px 20px;
      text-align: center;
      background: #262626;
      border-bottom: 1px solid #3a3a3a;
    }

    .brand {
      font-size: 28px;
      font-weight: bold;
      color: #ffffff;
      margin-bottom: 8px;
    }

    .subtitle {
      font-size: 15px;
      color: #cfcfcf;
      margin-bottom: 18px;
    }

    .price-box {
      background: #323232;
      border: 1px solid #4b4b4b;
      border-radius: 14px;
      padding: 16px;
      display: inline-block;
      min-width: 220px;
    }

    .price-label {
      font-size: 13px;
      color: #bfbfbf;
      margin-bottom: 6px;
    }

    .price {
      font-size: 30px;
      font-weight: bold;
      color: #ffffff;
    }

    .content {
      padding: 24px;
    }

    .section-title {
      font-size: 16px;
      font-weight: bold;
      margin-bottom: 14px;
      color: #ffffff;
    }

    .choice-buttons {
      display: flex;
      gap: 12px;
      margin-bottom: 24px;
    }

    .choice-buttons button {
      flex: 1;
      padding: 14px;
      border: none;
      border-radius: 12px;
      font-size: 15px;
      font-weight: bold;
      cursor: pointer;
      transition: 0.2s;
    }

    .btn-pix {
      background: #00b894;
      color: white;
    }

    .btn-card {
      background: #4f46e5;
      color: white;
    }

    .choice-buttons button:hover {
      opacity: 0.92;
      transform: translateY(-1px);
    }

    .panel {
      display: none;
      background: #2a2a2a;
      border: 1px solid #434343;
      border-radius: 14px;
      padding: 18px;
      margin-top: 8px;
    }

    .panel.active {
      display: block;
    }

    .status {
      margin-top: 14px;
      padding: 12px;
      border-radius: 10px;
      font-size: 14px;
      display: none;
      white-space: pre-wrap;
    }

    .status.success {
      display: block;
      background: #153b30;
      border: 1px solid #1f5b49;
      color: #d7fff4;
    }

    .status.error {
      display: block;
      background: #4a1f1f;
      border: 1px solid #6b2f2f;
      color: #ffd7d7;
    }

    .pix-box {
      background: #232323;
      border: 1px dashed #5a5a5a;
      border-radius: 12px;
      padding: 14px;
      margin-top: 12px;
    }

    .pix-code {
      word-break: break-all;
      font-size: 13px;
      color: #f1f1f1;
      margin-top: 10px;
      line-height: 1.5;
    }

    .copy-btn,
    .pay-btn {
      margin-top: 14px;
      width: 100%;
      padding: 13px;
      border: none;
      border-radius: 10px;
      font-size: 15px;
      font-weight: bold;
      cursor: pointer;
    }

    .copy-btn {
      background: #6c757d;
      color: white;
    }

    .pay-btn {
      background: #4f46e5;
      color: white;
    }

    .field {
      margin-bottom: 14px;
    }

    .field label {
      display: block;
      margin-bottom: 6px;
      font-size: 13px;
      color: #d3d3d3;
    }

    .field input {
      width: 100%;
      padding: 12px;
      border-radius: 10px;
      border: 1px solid #555;
      background: #181818;
      color: #fff;
      font-size: 14px;
    }

    .row {
      display: flex;
      gap: 12px;
    }

    .footer-note {
      margin-top: 20px;
      font-size: 12px;
      color: #bdbdbd;
      text-align: center;
      line-height: 1.5;
    }

    .small {
      font-size: 12px;
      color: #c9c9c9;
      margin-top: 8px;
    }

    .loading {
      opacity: 0.7;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="brand">Vitale Ambientes</div>
      <div class="subtitle">Projeto de móveis planejados</div>
      <div class="price-box">
        <div class="price-label">Valor do pagamento</div>
        <div class="price">R$ 1.500,00</div>
      </div>
    </div>

    <div class="content">
      <div class="section-title">Escolha como deseja pagar</div>

      <div class="choice-buttons">
        <button class="btn-pix" onclick="showPanel('pix')">Pagar com PIX</button>
        <button class="btn-card" onclick="showPanel('card')">Pagar com Cartão</button>
      </div>

      <div id="pix-panel" class="panel">
        <div class="section-title">Pagamento via PIX</div>
        <p class="small">Clique abaixo para gerar seu PIX.</p>
        <button class="pay-btn" onclick="gerarPix()">Gerar PIX</button>

        <div id="pix-result" style="display:none;">
          <div class="pix-box">
            <div><strong>PIX copia e cola</strong></div>
            <div id="pix-code" class="pix-code"></div>
            <button class="copy-btn" onclick="copiarPix()">Copiar código PIX</button>
          </div>
          <div class="small" id="pix-expiration"></div>
        </div>

        <div id="pix-status" class="status"></div>
      </div>

      <div id="card-panel" class="panel">
        <div class="section-title">Pagamento com Cartão</div>

        <div class="field">
          <label>Número do cartão</label>
          <input type="text" id="numero" placeholder="0000 0000 0000 0000">
        </div>

        <div class="field">
          <label>Nome no cartão</label>
          <input type="text" id="nome" placeholder="Nome igual ao cartão">
        </div>

        <div class="row">
          <div class="field" style="flex:1;">
            <label>Mês</label>
            <input type="text" id="mes" placeholder="MM">
          </div>
          <div class="field" style="flex:1;">
            <label>Ano</label>
            <input type="text" id="ano" placeholder="AAAA">
          </div>
          <div class="field" style="flex:1;">
            <label>CVV</label>
            <input type="text" id="cvv" placeholder="123">
          </div>
        </div>

        <button class="pay-btn" onclick="pagarCartao()">Pagar com Cartão</button>
        <div id="card-status" class="status"></div>
      </div>

      <div class="footer-note">
        Pagamento seguro • Vitale Ambientes
      </div>
    </div>
  </div>

  <script>
    const PUBLIC_KEY = "COLE_SUA_CHAVE_PUBLICA_AQUI";

    function showPanel(type) {
      document.getElementById("pix-panel").classList.remove("active");
      document.getElementById("card-panel").classList.remove("active");

      if (type === "pix") {
        document.getElementById("pix-panel").classList.add("active");
      } else {
        document.getElementById("card-panel").classList.add("active");
      }
    }

    function setStatus(id, message, type) {
      const el = document.getElementById(id);
      el.className = "status " + type;
      el.textContent = message;
    }

    async function gerarPix() {
      setStatus("pix-status", "Gerando PIX...", "success");

      try {
        const response = await fetch("/.netlify/functions/create-pix", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            amount: 1500,
            description: "Projeto de móveis planejados"
          })
        });

        const data = await response.json();

        if (!response.ok) {
          throw new Error(data.erro || "Erro ao gerar PIX");
        }

        const pixCode =
          data?.data?.pix?.qrcode ||
          data?.pix?.qrcode ||
          data?.qrcode ||
          "";

        const expiration =
          data?.data?.pix?.expirationDate ||
          data?.pix?.expirationDate ||
          "";

        if (!pixCode) {
          throw new Error("PIX gerado sem código copia e cola.");
        }

        document.getElementById("pix-code").textContent = pixCode;
        document.getElementById("pix-expiration").textContent =
          expiration ? "Validade: " + expiration : "";
        document.getElementById("pix-result").style.display = "block";
        setStatus("pix-status", "PIX gerado com sucesso.", "success");
      } catch (error) {
        setStatus("pix-status", "Erro: " + error.message, "error");
      }
    }

    async function copiarPix() {
      const text = document.getElementById("pix-code").textContent;
      await navigator.clipboard.writeText(text);
      alert("Código PIX copiado.");
    }

    async function pagarCartao() {
      setStatus("card-status", "Processando pagamento...", "success");

      try {
        await FastSoft.setPublicKey(PUBLIC_KEY);

        const cardData = {
          number: document.getElementById("numero").value,
          holderName: document.getElementById("nome").value,
          expMonth: document.getElementById("mes").value,
          expYear: document.getElementById("ano").value,
          cvv: document.getElementById("cvv").value
        };

        const token = await FastSoft.encrypt(cardData);

        const response = await fetch("/.netlify/functions/create-card", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            amount: 1500,
            description: "Projeto de móveis planejados",
            installments: 1,
            cardToken: token
          })
        });

        const data = await response.json();

        if (!response.ok) {
          throw new Error(data.erro || "Erro ao processar cartão");
        }

        const status =
          data?.data?.status ||
          data?.status ||
          "Pagamento enviado para análise";

        setStatus("card-status", "Status do pagamento: " + status, "success");
      } catch (error) {
        setStatus("card-status", "Erro: " + error.message, "error");
      }
    }
  </script>
</body>
</html>
